<!-- Floating Chat Button -->
<button 
  class="chat-button" 
  [class.active]="isOpen"
  (click)="toggleChat()" 
  aria-label="Open JinBo chat"
>
  <i class="fas fa-robot"></i>
</button>

<!-- Chat Panel -->
<div 
  class="chat-panel" 
  [class.open]="isOpen" 
  role="dialog" 
  aria-label="JinBo chat window"
>
  <div class="chat-header">
    <span class="header-title">JinBo Assistant</span>
    <div class="header-actions">
      <button class="clear-btn" (click)="clearMessages()">Clear</button>
      <button class="close-btn" (click)="closeChat()">
        <i class="fas fa-times"></i>
      </button>
    </div>
  </div>

  <div class="chat-body" #chatBody>
    <div *ngIf="messages.length === 0" class="empty-note">
      Start chatting with JinBo — your AI assistant
    </div>

    <div *ngFor="let msg of messages" class="chat-message" [ngClass]="msg.sender">
      <div class="msg-text">{{ msg.text }}</div>
      <div class="meta">
        {{ msg.sender === 'bot' ? '🤖 JinBo' : 'You' }} · {{ formatTime(msg.ts) }}
      </div>
    </div>

    <div *ngIf="isLoading" class="typing-indicator">
  <span></span><span></span><span></span>
</div>

  </div>

  <div class="chat-input">
    <input
      #inputEl
      [(ngModel)]="userInput"
      (keyup.enter)="sendMessage()"
      type="text"
      placeholder="Type a message..."
      autocomplete="off"
      inputmode="text"
      enterkeyhint="send"
    />
    <button 
      (click)="sendMessage()" 
      class="send-btn" 
      [disabled]="!botOnline"
      [class.disabled]="!botOnline"
    >
      <i class="fas fa-paper-plane"></i>
    </button>
  </div>

  <div class="disclaimer">
    ⚠️ AI-generated responses may be inaccurate. Verify before use.<br />
    <span *ngIf="!botOnline" class="bot-offline">🛠 JinBo is offline — please try later.</span>
  </div>
</div>
