<!-- Floating Button -->
<button class="chat-button" (click)="toggleChat()" aria-label="Open chat">
  <!-- Bot SVG Icon -->
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <path
      d="M12 2a1 1 0 0 1 1 1v1.09A7.002 7.002 0 0 1 19 11v1a1 1 0 0 1-1 1h-1v1.5a2.5 2.5 0 0 1-5 0V13h-2v1.5a2.5 2.5 0 0 1-5 0V13H5a1 1 0 0 1-1-1v-1a7.002 7.002 0 0 1 6-6.91V3a1 1 0 0 1 1-1zm-4 8a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm8 0a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"
    />
  </svg>
</button>

<!-- Chat Panel -->
<div class="chat-panel" [class.open]="isOpen">
  <!-- Header -->
  <div class="chat-header">
    <span>🤖 JinBo Assistant</span>
    <div class="header-actions">
      <button class="clear-btn" (click)="clearMessages()" title="Clear conversation">🧹</button>
      <button class="close-btn" (click)="closeChat()" title="Close chat">×</button>
    </div>
  </div>

  <!-- Chat Body -->
  <div class="chat-body" #chatBody>
    <div *ngIf="messages.length === 0" class="empty-note">
      <p>Start chatting with JinBo — your AI portfolio assistant 💬</p>
    </div>

    <div *ngFor="let msg of messages" class="chat-message" [ngClass]="msg.sender">
      <div class="msg-text">{{ msg.text }}</div>
      <div class="meta">{{ msg.sender === 'bot' ? 'JinBo' : 'You' }} · {{ formatTime(msg.ts) }}</div>
    </div>

    <div *ngIf="isLoading" class="loading">
      <span class="dot">●</span><span class="dot">●</span><span class="dot">●</span>
    </div>
  </div>

  <!-- Input -->
  <div class="chat-input">
    <input
      #inputEl
      [(ngModel)]="userInput"
      (keyup.enter)="sendMessage()"
      type="text"
      placeholder="Type a message..."
      autocomplete="off"
    />
    <button (click)="sendMessage()">Send</button>
  </div>

  <!-- Sticky Disclaimer -->
  <div class="disclaimer">
    ⚠️ AI-generated responses may be inaccurate. Verify before use.
  </div>
</div>
